services:
  - type: web
    name: trading-journal-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRICT_CORS
        value: "true"
      - key: TRUST_PROXY
        value: "1"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: EXPOSE_LOCAL_UPLOADS
        value: "false"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false

  - type: static_site
    name: trading-journal-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_AI_URL
        sync: false
      - key: VITE_APP_URL
        sync: false
      - key: VITE_ENABLE_PWA
        value: "true"

  - type: web
    name: journex-ai
    runtime: node
    rootDir: ai
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: AI_BASE_URL
        sync: false
      - key: AI_MODEL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_PROVIDER_LABEL
        sync: false
      - key: SEARCH_BASE_URL
        sync: false
      - key: SEARCH_TIMEOUT_MS
        value: "12000"
